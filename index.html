<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백석어학원 기초상담일지</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .lang-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .lang-btn { padding: 10px 15px; background-color: #e9ecef; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background-color: #003366; color: white; }
        h2 { text-align: center; color: #003366; border-bottom: 3px solid #003366; padding-bottom: 15px; margin-bottom: 30px; }
        
        /* 2단 배열 그리드 시스템 */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 0; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; font-size: 15px; }
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; }
        
        /* 달력 입력칸 스타일 및 리셋 버튼 */
        .date-wrapper { position: relative; display: flex; align-items: center; gap: 5px; }
        .btn-reset { padding: 8px 12px; background: #6c757d; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap; }

        .radio-group { padding: 10px 0; line-height: 1.8; }
        .radio-group label { display: inline-flex; align-items: center; font-weight: normal; margin-right: 20px; cursor: pointer; }
        .radio-group input { margin-right: 8px; }
        .inline-input { width: 150px !important; border-top: none !important; border-left: none !important; border-right: none !important; border-radius: 0 !important; background: transparent; padding: 2px 5px !important; }
        
        .section-title { font-size: 18px; font-weight: bold; color: #003366; border-left: 5px solid #003366; padding-left: 10px; margin: 35px 0 20px; }
        canvas { border: 2px solid #333; background-color: #fff; border-radius: 8px; width: 100%; max-width: 500px; height: 180px; touch-action: none; }
        .btn-submit { display: block; width: 100%; padding: 18px; background-color: #003366; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 30px; }
        .btn-submit:hover { background-color: #002244; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-buttons">
        <button class="lang-btn active" onclick="changeLanguage('ko', this)">한국어</button>
        <button class="lang-btn" onclick="changeLanguage('vi', this)">Tiếng Việt</button>
        <button class="lang-btn" onclick="changeLanguage('uz', this)">O'zbekcha</button>
        <button class="lang-btn" onclick="changeLanguage('mn', this)">Монгол хэл</button>
        <button class="lang-btn" onclick="changeLanguage('en', this)">English</button>
    </div>

    <h2 data-key="title">백석어학원 기초상담일지</h2>
    
    <form id="counselingForm">
        <div class="form-row">
            <div class="form-group"><label data-key="level">급</label><input type="text" id="level" placeholder="예: 1급" required></div>
            <div class="form-group"><label data-key="className">반</label><input type="text" id="className" placeholder="예: 1반" required></div>
        </div>

        <div class="form-row">
            <div class="form-group"><label data-key="nameKr">이름 (한글)</label><input type="text" id="nameKr" required></div>
            <div class="form-group"><label data-key="nameEn">이름 (영문)</label><input type="text" id="nameEn" required></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label data-key="birthDate">생년월일</label>
                <div class="date-wrapper">
                    <input type="date" id="birthDate" required onkeydown="return false;" onclick="try{this.showPicker();}catch(e){}" style="cursor: pointer;">
                    <button type="button" class="btn-reset" onclick="document.getElementById('birthDate').value=''" data-key="reset">지우기</button>
                </div>
            </div>
            <div class="form-group"><label data-key="country">국적 (나라)</label><input type="text" id="country" required></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label data-key="genderLabel">성별</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="남자" required> <span data-key="genderMale">남자</span></label>
                    <label><input type="radio" name="gender" value="여자"> <span data-key="genderFemale">여자</span></label>
                </div>
            </div>
            <div class="form-group"><label data-key="hobby">취미</label><input type="text" id="hobby"></div>
        </div>

        <div class="form-row">
            <div class="form-group"><label data-key="religion">종교</label><input type="text" id="religion"></div>
            <div class="form-group"><label data-key="phone">전화번호</label><input type="text" id="phone" required></div>
        </div>

        <div class="form-group"><label data-key="kakao">KakaoTalk ID</label><input type="text" id="kakao"></div>

        <div class="section-title" data-key="counselingSection">■ 상담 내용</div>
        
        <div class="form-group">
            <label data-key="q1">1. 지금 어디에서 살아요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q1" value="기숙사" required> <span data-key="q1_1">기숙사</span></label>
                <label><input type="radio" name="q1" value="기타"> <span data-key="other">기타</span> ( <input type="text" id="q1_other" class="inline-input"> )</label>
            </div>
        </div>
        <div class="form-group">
            <label data-key="q2">2. 몇 급까지 공부했어요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q2" value="안했어요" required> <span data-key="q2_1">안했어요</span></label>
                <label><input type="radio" name="q2" value="1급"> 1급</label>
                <label><input type="radio" name="q2" value="2급"> 2급</label>
                <label><input type="radio" name="q2" value="3급"> 3급</label>
                <label><input type="radio" name="q2" value="4급"> 4급</label>
                <label><input type="radio" name="q2" value="5급"> 5급</label>
                <label><input type="radio" name="q2" value="6급"> 6급</label>
            </div>
        </div>
        <div class="form-group">
            <label data-key="q3">3. 왜 한국어를 공부해요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q3" value="대학교 입학" required> <span data-key="q3_1">대학교 입학</span></label>
                <label><input type="radio" name="q3" value="한국에서 일"> <span data-key="q3_2">한국에서 일</span></label>
                <label><input type="radio" name="q3" value="기타"> <span data-key="other">기타</span> ( <input type="text" id="q3_other" class="inline-input"> )</label>
            </div>
        </div>
        <div class="form-group">
            <label data-key="q4">4. 학비는 누가 내요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q4" value="부모님" required> <span data-key="q4_1">부모님</span></label>
                <label><input type="radio" name="q4" value="나"> <span data-key="q4_2">나</span></label>
                <label><input type="radio" name="q4" value="기타"> <span data-key="other">기타</span> ( <input type="text" id="q4_other" class="inline-input"> )</label>
            </div>
        </div>
        <div class="form-group">
            <label data-key="q5">5. 한국어 공부할 때 무엇이 가장 어려워요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q5" value="문법" required> <span data-key="q5_1">문법</span></label>
                <label><input type="radio" name="q5" value="읽기"> <span data-key="q5_2">읽기</span></label>
                <label><input type="radio" name="q5" value="쓰기"> <span data-key="q5_3">쓰기</span></label>
                <label><input type="radio" name="q5" value="듣기"> <span data-key="q5_4">듣기</span></label>
                <label><input type="radio" name="q5" value="말하기"> <span data-key="q5_5">말하기</span></label>
                <label><input type="radio" name="q5" value="기타"> <span data-key="other">기타</span> ( <input type="text" id="q5_other" class="inline-input"> )</label>
            </div>
        </div>
        <div class="form-group">
            <label data-key="q6">6. 아픈 곳이 있어요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q6" value="건강해요" required> <span data-key="q6_1">건강해요</span></label>
                <label><input type="radio" name="q6" value="네, 아파요"> <span data-key="q6_2">네, 아파요</span> ( <input type="text" id="q6_other" class="inline-input"> )</label>
            </div>
        </div>
        <div class="form-group">
            <label data-key="q7">7. TOPIK 급수가 있어요?</label>
            <div class="radio-group">
                <label><input type="radio" name="q7" value="없어요" required> <span data-key="q7_1">없어요</span></label>
                <label><input type="radio" name="q7" value="2급"> 2급</label>
                <label><input type="radio" name="q7" value="3급"> 3급</label>
                <label><input type="radio" name="q7" value="4급"> 4급</label>
                <label><input type="radio" name="q7" value="5급"> 5급</label>
                <label><input type="radio" name="q7" value="6급"> 6급</label>
            </div>
        </div>
        <div class="form-group"><label data-key="q8">8. 하고 싶은 말이 있어요?</label><input type="text" id="q8"></div>

        <hr>
        <div class="form-group">
            <label data-key="memoLabel">■ 정기 상담 메모</label>
            <input type="text" id="memo">
        </div>

        <div class="form-group">
            <label data-key="signLabel">서명 (Signature)</label>
            <div style="margin-bottom:10px;"><button type="button" onclick="clearSignature()" data-key="signClear">지우기</button></div>
            <canvas id="signaturePad"></canvas>
        </div>

        <button type="submit" class="btn-submit" data-key="submitBtn">제출하기 (Submit)</button>
    </form>
</div>

<script>
    // ★ 주의: 만약 웹 앱 새 배포 시 주소가 바뀌었다면 이 URL을 교체해주세요!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWF8o1DrrDaFKQgtT23erUc7BjqBgHcg6t18IJ2VM_88i-njuRthauHdvrlR4s4pOA/exec";
    
    let currentLangName = "한국어";

    const dict = {
        title: { ko: "백석어학원 기초상담일지", vi: "Nhật ký tư vấn cơ bản", uz: "Asosiy maslahat jurnali", mn: "Үндсэн зөвлөгөөний тэмдэглэл", en: "Basic Counseling Log" },
        level: { ko: "급 (Level)", vi: "Cấp độ", uz: "Daraja", mn: "Түвшин", en: "Level" },
        className: { ko: "반 (Class)", vi: "Lớp", uz: "Sinf", mn: "Анги", en: "Class" },
        nameKr: { ko: "이름 (한글)", vi: "Tên (tiếng Hàn)", uz: "Ism (Koreyscha)", mn: "Нэр (Солонгос)", en: "Name (Korean)" },
        nameEn: { ko: "이름 (영문)", vi: "Tên (tiếng Anh)", uz: "Ism (Inglizcha)", mn: "Нэр (Англи)", en: "Name (English)" },
        birthDate: { ko: "생년월일 (Date of Birth)", vi: "Ngày sinh", uz: "Tug'ilgan sana", mn: "Төрсөн он сар өдөр", en: "Date of Birth" },
        reset: { ko: "지우기", vi: "Xóa", uz: "O'chirish", mn: "Арилгах", en: "Clear" },
        genderLabel: { ko: "성별 (Gender)", vi: "Giới tính", uz: "Jinsi", mn: "Хүйс", en: "Gender" },
        genderMale: { ko: "남자", vi: "Nam", uz: "Erkak", mn: "Эрэгтэй", en: "Male" },
        genderFemale: { ko: "여자", vi: "Nữ", uz: "Ayol", mn: "Эмэгтэй", en: "Female" },
        country: { ko: "국적 (나라)", vi: "Quốc tịch", uz: "Millati (Davlat)", mn: "Харьяалал (Улс)", en: "Nationality (Country)" },
        hobby: { ko: "취미 (Hobby)", vi: "Sở thích", uz: "Qiziqishlari", mn: "Хобби", en: "Hobby" },
        religion: { ko: "종교 (Religion)", vi: "Tôn giáo", uz: "Dini", mn: "Шашин", en: "Religion" },
        phone: { ko: "전화번호 (Phone)", vi: "Số điện thoại", uz: "Telefon raqami", mn: "Утасны дугаар", en: "Phone Number" },
        kakao: { ko: "KakaoTalk ID", vi: "KakaoTalk ID", uz: "KakaoTalk ID", mn: "KakaoTalk ID", en: "KakaoTalk ID" },
        counselingSection: { ko: "■ 상담 내용", vi: "■ Nội dung tư vấn", uz: "■ Maslahat mazmuni", mn: "■ Зөвлөгөөний агуулга", en: "■ Counseling Content" },
        q1: { ko: "1. 지금 어디에서 살아요?", vi: "1. Bạn đang sống ở đâu?", uz: "1. Hozir qayerda yashaysiz?", mn: "1. Одоо хаана амьдарч байна вэ?", en: "1. Where do you live now?" },
        q1_1: { ko: "기숙사", vi: "Ký túc xá", uz: "Yotoqxona", mn: "Дотуур байр", en: "Dormitory" },
        other: { ko: "기타", vi: "Khác", uz: "Boshqa", mn: "Бусад", en: "Other" },
        q2: { ko: "2. 몇 급까지 공부했어요?", vi: "2. Bạn đã học đến cấp độ nào?", uz: "2. Qaysi darajagacha o'qidingiz?", mn: "2. Хэддүгээр түвшин хүртэл сурсан бэ?", en: "2. What level did you study up to?" },
        q2_1: { ko: "안했어요", vi: "Chưa học", uz: "O'qimaganman", mn: "Сураагүй", en: "Didn't study" },
        q3: { ko: "3. 왜 한국어를 공부해요?", vi: "3. Tại sao bạn học tiếng Hàn?", uz: "3. Nima uchun koreys tilini o'rganyapsiz?", mn: "3. Яагаад солонгос хэл сурч байгаа вэ?", en: "3. Why do you study Korean?" },
        q3_1: { ko: "대학교 입학", vi: "Nhập học đại học", uz: "Universitetga kirish", mn: "Их сургуульд элсэх", en: "University admission" },
        q3_2: { ko: "한국에서 일", vi: "Làm việc tại Hàn Quốc", uz: "Koreyada ishlash", mn: "Солонгост ажиллах", en: "Work in Korea" },
        q4: { ko: "4. 학비는 누가 내요?", vi: "4. Ai trả học phí?", uz: "4. O'qish pulini kim to'laydi?", mn: "4. Сургалтын төлбөрөө хэн төлдөг вэ?", en: "4. Who pays the tuition?" },
        q4_1: { ko: "부모님", vi: "Bố mẹ", uz: "Ota-onam", mn: "Эцэг эх", en: "Parents" },
        q4_2: { ko: "나", vi: "Tôi", uz: "O'zim", mn: "Би өөрөө", en: "Me" },
        q5: { ko: "5. 한국어 공부할 때 무엇이 가장 어려워요?", vi: "5. Khi học tiếng Hàn điều gì khó nhất?", uz: "5. Koreys tilini o'rganishda nima eng qiyin?", mn: "5. Солонгос хэл сурахад юу хамгийн хэцүү вэ?", en: "5. What is the hardest part of studying Korean?" },
        q5_1: { ko: "문법", vi: "Ngữ pháp", uz: "Grammatika", mn: "Дүрэм", en: "Grammar" },
        q5_2: { ko: "읽기", vi: "Đọc", uz: "O'qish", mn: "Унших", en: "Reading" },
        q5_3: { ko: "쓰기", vi: "Viết", uz: "Yozish", mn: "Бичих", en: "Writing" },
        q5_4: { ko: "듣기", vi: "Nghe", uz: "Tinglash", mn: "Сонсох", en: "Listening" },
        q5_5: { ko: "말하기", vi: "Nói", uz: "Gapirish", mn: "Ярих", en: "Speaking" },
        q6: { ko: "6. 아픈 곳이 있어요?", vi: "6. Bạn có bị đau ở đâu không?", uz: "6. Kasal joyingiz bormi?", mn: "6. Өвдсөн газар байгаа юу?", en: "6. Are you sick anywhere?" },
        q6_1: { ko: "건강해요", vi: "Tôi khỏe", uz: "Sog'lomman", mn: "Эрүүл", en: "I'm healthy" },
        q6_2: { ko: "네, 아파요", vi: "Vâng, bị đau", uz: "Ha, og'riyapti", mn: "Тийм ээ, өвдөж байна", en: "Yes, it hurts" },
        q7: { ko: "7. TOPIK 급수가 있어요?", vi: "7. Bạn có cấp độ TOPIK không?", uz: "7. TOPIK darajangiz bormi?", mn: "7. TOPIK зэрэгтэй юу?", en: "7. Do you have a TOPIK level?" },
        q7_1: { ko: "없어요", vi: "Không có", uz: "Yo'q", mn: "Байхгүй", en: "No" },
        q8: { ko: "8. 하고 싶은 말이 있어요?", vi: "8. Bạn có lời gì muốn nói không?", uz: "8. Aytmoqchi bo'lgan gapingiz bormi?", mn: "8. Хэлэхийг хүссэн зүйл байна уу?", en: "8. Anything you want to say?" },
        memoLabel: { ko: "■ 정기 상담 메모", vi: "■ Ghi chú tư vấn định kỳ", uz: "■ Doimiy maslahat eslatmasi", mn: "■ Тогтмол зөвлөгөөний тэмдэглэл", en: "■ Regular Counseling Memo" },
        signLabel: { ko: "서명", vi: "Chữ ký (Signature)", uz: "Imzo (Signature)", mn: "Гарын үсэг (Signature)", en: "Signature" },
        signClear: { ko: "지우기", vi: "Xóa", uz: "O'chirish", mn: "Арилгах", en: "Clear" },
        submitBtn: { ko: "제출하기", vi: "Gửi đi", uz: "Yuborish", mn: "Илгээх", en: "Submit" }
    };

    function changeLanguage(lang, btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const langMap = { 'ko': '한국어', 'vi': '베트남어', 'uz': '우즈베크어', 'mn': '몽골어', 'en': '영어' };
        currentLangName = langMap[lang];
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if(dict[key]) {
                el.innerText = lang === 'ko' ? dict[key].ko : `${dict[key].ko} (${dict[key][lang]})`;
            }
        });
    }

    // 서명 패드 로직
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    canvas.addEventListener('mousedown', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', e => { 
        if(isDrawing) { 
            const r = canvas.getBoundingClientRect(); 
            ctx.lineTo(e.clientX-r.left, e.clientY-r.top); 
            ctx.stroke(); 
        } 
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isDrawing = true;
        const r = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
    }, {passive: false});
    
    canvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const r = canvas.getBoundingClientRect();
        ctx.lineTo(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
        ctx.stroke();
    }, {passive: false});
    
    canvas.addEventListener('touchend', () => isDrawing = false);

    function clearSignature() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        ctx.beginPath(); 
    }

    // 데이터 제출 로직
    document.getElementById('counselingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const getRadioVal = (name) => {
            const ele = document.querySelector(`input[name="${name}"]:checked`);
            return ele ? ele.value : "";
        }
        
        const getRadioWithOther = (name, otherId) => {
            const ele = document.querySelector(`input[name="${name}"]:checked`);
            if (!ele) return "";
            if (ele.value === '기타' || ele.value === '네, 아파요') {
                const otherVal = document.getElementById(otherId).value;
                return ele.value + (otherVal ? " (" + otherVal + ")" : "");
            }
            return ele.value;
        };

        const formData = {
            language: currentLangName || "한국어",
            level: document.getElementById('level').value,
            className: document.getElementById('className').value,
            nameKr: document.getElementById('nameKr').value,
            nameEn: document.getElementById('nameEn').value,
            birthDate: document.getElementById('birthDate').value,
            gender: getRadioVal('gender'),
            country: document.getElementById('country').value,
            hobby: document.getElementById('hobby').value,
            religion: document.getElementById('religion').value,
            phone: document.getElementById('phone').value,
            kakao: document.getElementById('kakao').value,
            q1: getRadioWithOther('q1', 'q1_other'),
            q2: getRadioVal('q2'),
            q3: getRadioWithOther('q3', 'q3_other'),
            q4: getRadioWithOther('q4', 'q4_other'),
            q5: getRadioWithOther('q5', 'q5_other'),
            q6: getRadioWithOther('q6', 'q6_other'),
            q7: getRadioVal('q7'),
            q8: document.getElementById('q8').value,
            memo: document.getElementById('memo').value,
            signature: canvas.toDataURL()
        };

        alert("데이터를 전송 중입니다. 잠시만 기다려주세요...");

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(formData) })
        .then(res => res.json())
        .then(d => {
            if(d.result === 'success') {
                alert("제출이 완료되었습니다!");
                document.getElementById('counselingForm').reset();
                clearSignature();
            } else {
                alert("오류가 발생했습니다: " + d.message);
            }
        })
        .catch(error => {
            alert("네트워크 오류가 발생했습니다.");
            console.error('Error:', error);
        });
    });
</script>
</body>
</html>
