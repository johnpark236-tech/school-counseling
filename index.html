<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백석어학원 기초상담일지</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* 언어 선택 버튼 스타일 */
        .lang-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .lang-btn { padding: 8px 12px; background-color: #e0e0e0; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; color: #333; font-weight: bold; }
        .lang-btn:hover { background-color: #d0d0d0; }
        .lang-btn.active { background-color: #003366; color: white; }

        h2 { text-align: center; border-bottom: 2px solid #003366; padding-bottom: 10px; color: #003366; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="date"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .radio-group { margin-bottom: 15px; }
        .radio-group label { display: inline-block; font-weight: normal; margin-right: 15px; }
        canvas { border: 1px solid #000; background-color: #fff; border-radius: 4px; cursor: crosshair; touch-action: none; width: 100%; max-width: 400px; }
        .btn-submit { display: block; width: 100%; padding: 15px; background-color: #003366; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background-color: #002244; }
        .signature-controls { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-buttons">
        <button class="lang-btn active" onclick="changeLanguage('ko', this)">한국어</button>
        <button class="lang-btn" onclick="changeLanguage('vi', this)">Tiếng Việt</button>
        <button class="lang-btn" onclick="changeLanguage('uz', this)">O'zbekcha</button>
        <button class="lang-btn" onclick="changeLanguage('mn', this)">Монгол хэл</button>
        <button class="lang-btn" onclick="changeLanguage('en', this)">English</button>
    </div>

    <h2 data-key="title">백석어학원 기초상담일지</h2>
    
    <form id="counselingForm">
        <div class="form-group"><label data-key="nameKr">이름 (한글)</label><input type="text" id="nameKr" required></div>
        <div class="form-group"><label data-key="nameEn">이름 (영문)</label><input type="text" id="nameEn" required></div>
        <div class="form-group"><label data-key="birthDate">생년월일</label><input type="date" id="birthDate" required></div>
        
        <div class="radio-group">
            <label data-key="genderLabel" style="display:block; font-weight:bold; margin-bottom:5px;">성별:</label>
            <label><input type="radio" name="gender" value="남자" required> <span data-key="genderMale">남자</span></label>
            <label><input type="radio" name="gender" value="여자"> <span data-key="genderFemale">여자</span></label>
        </div>

        <div class="form-group"><label data-key="country">국적 (나라)</label><input type="text" id="country" required></div>
        
        <div class="form-group"><label data-key="hobby">취미</label><input type="text" id="hobby"></div>
        <div class="form-group"><label data-key="religion">종교</label><input type="text" id="religion"></div>
        
        <div class="form-group"><label data-key="phone">전화번호</label><input type="text" id="phone" required></div>
        <div class="form-group"><label data-key="kakao">KakaoTalk ID</label><input type="text" id="kakao"></div>

        <hr>

        <div class="form-group">
            <label data-key="memoLabel">■ 상담 메모</label>
            <input type="text" id="memo">
        </div>

        <hr>

        <div class="form-group">
            <label data-key="signLabel">서명 (아래 네모 칸에 마우스나 손가락으로 사인해 주세요)</label>
            <div class="signature-controls">
                <button type="button" onclick="clearSignature()" data-key="signClear">서명 지우기</button>
            </div>
            <canvas id="signaturePad" width="400" height="150"></canvas>
        </div>

        <button type="submit" class="btn-submit" data-key="submitBtn">제출하기</button>
    </form>
</div>

<script>
    // 구글 스크립트 웹 앱 URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWF8o1DrrDaFKQgtT23erUc7BjqBgHcg6t18IJ2VM_88i-njuRthauHdvrIR4s4pOA/exec";

    // 번역 데이터 사전
    const dict = {
        title: { 
            ko: "백석어학원 기초상담일지", 
            vi: "Nhật ký tư vấn cơ bản", 
            uz: "Asosiy maslahat jurnali", 
            mn: "Үндсэн зөвлөгөөний тэмдэглэл", 
            en: "Basic Counseling Log" 
        },
        nameKr: { ko: "이름 (한글)", vi: "Tên (tiếng Hàn)", uz: "Ism (Koreys tilida)", mn: "Нэр (Солонгос хэлээр)", en: "Name (Korean)" },
        nameEn: { ko: "이름 (영문)", vi: "Tên (tiếng Anh)", uz: "Ism (Ingliz tilida)", mn: "Нэр (Англиар)", en: "Name (English)" },
        birthDate: { ko: "생년월일", vi: "Ngày sinh", uz: "Tug'ilgan sana", mn: "Төрсөн он сар өдөр", en: "Date of Birth" },
        genderLabel: { ko: "성별:", vi: "Giới tính:", uz: "Jinsi:", mn: "Хүйс:", en: "Gender:" },
        genderMale: { ko: "남자", vi: "Nam", uz: "Erkak", mn: "Эрэгтэй", en: "Male" },
        genderFemale: { ko: "여자", vi: "Nữ", uz: "Ayol", mn: "Эмэгтэй", en: "Female" },
        country: { 
            ko: "국적 (나라)", 
            vi: "Quốc tịch", 
            uz: "Millati (Davlat)", 
            mn: "Иргэншил (Улс)", 
            en: "Nationality (Country)" 
        },
        hobby: { ko: "취미", vi: "Sở thích", uz: "Qiziqishlari", mn: "Хобби", en: "Hobby" },
        religion: { ko: "종교", vi: "Tôn giáo", uz: "Dini", mn: "Шашин", en: "Religion" },
        phone: { ko: "전화번호", vi: "Số điện thoại", uz: "Telefon raqami", mn: "Утасны дугаар", en: "Phone Number" },
        kakao: { 
            ko: "KakaoTalk ID", 
            vi: "KakaoTalk ID", 
            uz: "KakaoTalk ID", 
            mn: "KakaoTalk ID", 
            en: "KakaoTalk ID" 
        },
        memoLabel: { 
            ko: "■ 상담 메모", 
            vi: "■ Ghi chú tư vấn", 
            uz: "■ Maslahat eslatmasi", 
            mn: "■ Зөвлөгөөний тэмдэглэл", 
            en: "■ Counseling Memo" 
        },
        signLabel: { 
            ko: "서명 (아래 네모 칸에 마우스나 손가락으로 사인해 주세요)", 
            vi: "Chữ ký (Vui lòng dùng chuột hoặc ngón tay để ký vào ô bên dưới)", 
            uz: "Imzo (Quyidagi maydonga sichqoncha yoki barmog'ingiz bilan imzo cheking)", 
            mn: "Гарын үсэг (Доорх нүдэнд хулгана эсвэл хуруугаараа зурна уу)", 
            en: "Signature (Please sign in the box below using your mouse or finger)" 
        },
        signClear: { ko: "서명 지우기", vi: "Xóa chữ ký", uz: "Imzoni o'chirish", mn: "Гарын үсэг арилгах", en: "Clear Signature" },
        submitBtn: { ko: "제출하기", vi: "Gửi đi", uz: "Yuborish", mn: "Илгээх", en: "Submit" }
    };
    // 언어 변경 함수
    function changeLanguage(lang, btnElement) {
        // 버튼 색상 활성화 처리
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        // 모든 텍스트 치환
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            const koText = dict[key].ko;
            if (lang === 'ko') {
                el.innerText = koText;
            } else {
                el.innerText = `${koText} (${dict[key][lang]})`;
            }
        });
    }

    // 서명 패드 (Canvas) 설정
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);

    function getCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        if(e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        }
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function startDrawing(e) {
        e.preventDefault();
        isDrawing = true;
        const coords = getCoordinates(e);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const coords = getCoordinates(e);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
    }

    function stopDrawing() { isDrawing = false; }
    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // 폼 제출 처리
    document.getElementById('counselingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const getRadioVal = (name) => {
            const ele = document.querySelector(`input[name="${name}"]:checked`);
            return ele ? ele.value : "";
        }

        const signatureData = canvas.toDataURL(); 

        const formData = {
            nameKr: document.getElementById('nameKr').value,
            nameEn: document.getElementById('nameEn').value,
            birthDate: document.getElementById('birthDate').value,
            gender: getRadioVal('gender'),
            country: document.getElementById('country').value,
            hobby: document.getElementById('hobby').value,       
            religion: document.getElementById('religion').value, 
            phone: document.getElementById('phone').value,
            kakao: document.getElementById('kakao').value,
            memo: document.getElementById('memo').value,
            signature: signatureData
        };

        alert("데이터를 전송 중입니다. 잠시만 기다려주세요...");

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === 'success') {
                alert("제출이 완료되었습니다!");
                document.getElementById('counselingForm').reset();
                clearSignature();
            } else {
                alert("오류가 발생했습니다: " + data.message);
            }
        })
        .catch(error => {
            alert("네트워크 오류가 발생했습니다.");
            console.error('Error:', error);
        });
    });
</script>

</body>
</html>
